kind = "web"
previewPath = "/"
title = "ChatBridge"
version = "1.0.0"
id = "artifacts/chatbridge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22124

[services.development]
run = "pnpm --filter @workspace/chatbridge run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/chatbridge", "run", "build" ]
publicDir = "artifacts/chatbridge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22124"
BASE_PATH = "/"
